name: Update nano binary

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config gettext autopoint texinfo

      - name: Download, build, and store latest nano
        run: bash ./scripts/update_nano.sh

      - name: Commit and push changes
        run: |
          git add -A binaries

          if git diff --cached --quiet; then
            echo "No changes in binaries directory."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update nano binary"
          git pull --no-rebase origin main
          git push
