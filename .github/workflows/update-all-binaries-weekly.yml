name: Update all binaries weekly

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

concurrency:
  group: binaries-weekly-update
  cancel-in-progress: false

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf automake libtool pkg-config gettext autopoint texinfo libncursesw5-dev

      - name: Update lazydocker
        id: update_lazydocker
        continue-on-error: true
        run: bash ./scripts/update_lazydocker.sh

      - name: Update htop
        id: update_htop
        continue-on-error: true
        run: bash ./scripts/update_htop.sh

      - name: Update nano
        id: update_nano
        continue-on-error: true
        run: bash ./scripts/update_nano.sh

      - name: Commit and push changes
        if: always()
        run: |
          git add -A binaries

          if git diff --cached --quiet; then
            echo "No changes in binaries directory."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: weekly update binaries"
          git pull --no-rebase origin main
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Weekly binaries update summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- lazydocker: ${{ steps.update_lazydocker.outcome }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- htop: ${{ steps.update_htop.outcome }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- nano: ${{ steps.update_nano.outcome }}" >> "${GITHUB_STEP_SUMMARY}"

      - name: Fail workflow if any updater failed
        if: always()
        run: |
          failed=""

          if [[ "${{ steps.update_lazydocker.outcome }}" != "success" ]]; then
            failed="${failed} lazydocker"
          fi

          if [[ "${{ steps.update_htop.outcome }}" != "success" ]]; then
            failed="${failed} htop"
          fi

          if [[ "${{ steps.update_nano.outcome }}" != "success" ]]; then
            failed="${failed} nano"
          fi

          if [[ -n "${failed}" ]]; then
            echo "Failed updaters:${failed}"
            exit 1
          fi
